<!DOCTYPE html>

<div class="row"><div class="tok">space-8</div><div class="bar" style="width:32px"></div><div class="px">32px</div></div>
<div class="row"><div class="tok">space-12</div><div class="bar" style="width:48px"></div><div class="px">48px</div></div>
