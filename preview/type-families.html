<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--font-body);color:var(--fg1)}
.row{display:flex;align-items:baseline;gap:18px;margin-bottom:10px}
.role{font-family:var(--font-heading);font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--lilla-md);width:80px;flex-shrink:0}
.family{font-family:var(--font-heading);font-size:12px;color:var(--fg2);width:120px;flex-shrink:0}
.sample{font-size:26px}
</style></head><body>
<div class="row"><div class="role">Display</div><div class="family">Bricolage Grotesque</div><div class="sample" style="font-family:var(--font-display);font-weight:700">Kaivros breathes.</div></div>
<div class="row"><div class="role">Heading</div><div class="family">Outfit</div><div class="sample" style="font-family:var(--font-heading);font-weight:600">Your sessions, ready.</div></div>
<div class="row"><div class="role">Body</div><div class="family">Noto Sans</div><div class="sample" style="font-family:var(--font-body);font-size:17px;line-height:1.5">Calm, legible, long-form friendly.</div></div>
<div class="row"><div class="role">Mono</div><div class="family">SF Mono / Fira</div><div class="sample" style="font-family:var(--font-mono);font-size:14px">--lilla-md: #A98FD8;</div></div>
</body></html>
