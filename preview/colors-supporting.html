<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--font-body)}
.row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.sw{border-radius:var(--radius-md);aspect-ratio:1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
.name{font-family:var(--font-heading);font-weight:600;font-size:10px;line-height:1}
.hex{font-family:var(--font-mono);font-size:9px;opacity:.55;margin-top:3px;letter-spacing:.04em}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--blush);color:rgba(0,0,0,.7)"><div class="name">blush</div><div class="hex">#FE9DC0</div></div>
  <div class="sw" style="background:var(--daffodil);color:rgba(0,0,0,.7)"><div class="name">daffodil</div><div class="hex">#FCCD86</div></div>
  <div class="sw" style="background:var(--meadow);color:#fff"><div class="name">meadow</div><div class="hex">#A8BF8A</div></div>
  <div class="sw" style="background:var(--sky);color:#fff"><div class="name">sky</div><div class="hex">#89B7C2</div></div>
  <div class="sw" style="background:var(--mint);color:rgba(0,0,0,.7)"><div class="name">mint</div><div class="hex">#98D8C8</div></div>
  <div class="sw" style="background:var(--coral);color:#fff"><div class="name">coral</div><div class="hex">#FE794E</div></div>
</div>
</body></html>
