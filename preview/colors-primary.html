<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--font-body)}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.sw{border-radius:var(--radius-md);aspect-ratio:3/2;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px}
.name{font-family:var(--font-heading);font-weight:600;font-size:11px;line-height:1}
.hex{font-family:var(--font-mono);font-size:10px;opacity:.55;margin-top:3px;letter-spacing:.04em}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--lilla-lt);color:rgba(0,0,0,.65)"><div class="name">lilla-lt</div><div class="hex">#DDD1F2</div></div>
  <div class="sw" style="background:var(--lilla);color:rgba(0,0,0,.65)"><div class="name">lilla</div><div class="hex">#C5AEE8</div></div>
  <div class="sw" style="background:var(--lilla-md);color:#fff"><div class="name">lilla-md</div><div class="hex">#A98FD8</div></div>
  <div class="sw" style="background:var(--lilla-dk);color:#fff"><div class="name">lilla-dk</div><div class="hex">#8B6EC4</div></div>
  <div class="sw" style="background:var(--violet-lt);color:#fff"><div class="name">violet-lt</div><div class="hex">#6B4F8E</div></div>
  <div class="sw" style="background:var(--violet);color:#fff"><div class="name">violet</div><div class="hex">#493364</div></div>
  <div class="sw" style="background:var(--violet-dk);color:var(--lilla-lt)"><div class="name">violet-dk</div><div class="hex">#2E1F40</div></div>
  <div class="sw" style="background:var(--black);color:var(--lilla-lt)"><div class="name">black</div><div class="hex">#1F1F1F</div></div>
</div>
</body></html>
