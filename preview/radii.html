<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--font-body);color:var(--fg1);display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.cell{display:flex;flex-direction:column;align-items:center;gap:8px}
.box{width:84px;height:58px;background:var(--lilla-lt);border:1.5px solid var(--lilla-md)}
.tok{font-family:var(--font-mono);font-size:10px;color:var(--fg2)}
.val{font-family:var(--font-heading);font-weight:600;font-size:11px;color:var(--fg1)}
</style></head><body>
<div class="cell"><div class="box" style="border-radius:4px"></div><div class="val">xs</div><div class="tok">4px</div></div>
<div class="cell"><div class="box" style="border-radius:8px"></div><div class="val">default</div><div class="tok">8px</div></div>
<div class="cell"><div class="box" style="border-radius:12px"></div><div class="val">md</div><div class="tok">12px</div></div>
<div class="cell"><div class="box" style="border-radius:16px"></div><div class="val">lg</div><div class="tok">16px</div></div>
<div class="cell"><div class="box" style="border-radius:20px"></div><div class="val">xl</div><div class="tok">20px</div></div>
<div class="cell"><div class="box" style="border-radius:24px"></div><div class="val">2xl</div><div class="tok">24px</div></div>
<div class="cell"><div class="box" style="border-radius:9999px"></div><div class="val">full</div><div class="tok">pill</div></div>
<div class="cell"><div class="box" style="border-radius:0"></div><div class="val">none</div><div class="tok">0</div></div>
</body></html>
