<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--font-body)}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.sw{border-radius:var(--radius-md);aspect-ratio:3/2;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px}
.name{font-family:var(--font-heading);font-weight:600;font-size:11px;line-height:1}
.hex{font-family:var(--font-mono);font-size:10px;opacity:.55;margin-top:3px;letter-spacing:.04em}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--orange-lt);color:rgba(0,0,0,.6)"><div class="name">orange-lt</div><div class="hex">#FFB38A</div></div>
  <div class="sw" style="background:var(--orange);color:#fff"><div class="name">orange</div><div class="hex">#FE794E</div></div>
  <div class="sw" style="background:var(--orange-md);color:#fff"><div class="name">orange-md</div><div class="hex">#E85C3E</div></div>
  <div class="sw" style="background:var(--orange-dk);color:#fff"><div class="name">orange-dk</div><div class="hex">#D65A3E</div></div>
</div>
</body></html>
