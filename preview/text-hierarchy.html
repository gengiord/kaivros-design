<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--font-body);color:var(--fg1)}
.row{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.sample{font-family:var(--font-body);flex:1}
.tok{font-family:var(--font-mono);font-size:10px;color:var(--fg3);width:70px}
.opacity{font-family:var(--font-mono);font-size:10px;color:var(--fg3);margin-left:auto}
</style></head><body>
<div class="row"><div class="tok">fg1</div><div class="sample" style="color:var(--fg1);font-size:15px">Primary text — the most important words</div><div class="opacity">100%</div></div>
<div class="row"><div class="tok">fg2</div><div class="sample" style="color:var(--fg2);font-size:15px">Secondary text — supporting copy</div><div class="opacity">60%</div></div>
<div class="row"><div class="tok">fg3</div><div class="sample" style="color:var(--fg3);font-size:15px">Muted text — captions, hints, metadata</div><div class="opacity">40%</div></div>
<div class="row"><div class="tok">fg-brand</div><div class="sample" style="color:var(--lilla-md);font-family:var(--font-heading);font-weight:600;font-size:15px">Brand accent text (lilla-md)</div><div class="opacity">—</div></div>
<div class="row"><div class="tok">fg-violet</div><div class="sample" style="color:var(--violet);font-family:var(--font-heading);font-weight:600;font-size:15px">Deep accent text (violet)</div><div class="opacity">—</div></div>
</body></html>
