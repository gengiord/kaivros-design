<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--font-body);color:var(--fg1)}
.row{display:flex;gap:14px;align-items:center;margin-bottom:10px}
.sw{width:40px;height:40px;border-radius:var(--radius);flex-shrink:0}
.lbl{font-family:var(--font-heading);font-weight:600;font-size:13px;min-width:130px}
.use{font-size:12px;color:var(--fg2)}
.hex{font-family:var(--font-mono);font-size:10px;color:var(--fg3);margin-left:auto}
</style></head><body>
<div class="row"><div class="sw" style="background:var(--meadow)"></div><div class="lbl">success</div><div class="use">positive states, completion</div><div class="hex">#A8BF8A</div></div>
<div class="row"><div class="sw" style="background:var(--daffodil)"></div><div class="lbl">warning</div><div class="use">caution, attention needed</div><div class="hex">#FCCD86</div></div>
<div class="row"><div class="sw" style="background:var(--orange-md)"></div><div class="lbl">error</div><div class="use">destructive, validation fail</div><div class="hex">#E85C3E</div></div>
<div class="row"><div class="sw" style="background:var(--sky)"></div><div class="lbl">info</div><div class="use">neutral notices, tips</div><div class="hex">#89B7C2</div></div>
</body></html>
