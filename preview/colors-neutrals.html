<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--font-body)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.sw{border-radius:var(--radius-md);aspect-ratio:2/1;display:flex;flex-direction:column;justify-content:flex-end;padding:12px 14px}
.name{font-family:var(--font-heading);font-weight:600;font-size:11px}
.hex{font-family:var(--font-mono);font-size:10px;opacity:.55;margin-top:3px}
</style></head><body>
<div class="grid">
  <div class="sw" style="background:var(--cream);border:1px solid var(--border);color:var(--fg1)"><div class="name">cream</div><div class="hex">#F9F6EF</div></div>
  <div class="sw" style="background:#fff;border:1px solid var(--border);color:var(--fg1)"><div class="name">white</div><div class="hex">#FFFFFF</div></div>
  <div class="sw" style="background:var(--black);color:#fff"><div class="name">black</div><div class="hex">#1F1F1F</div></div>
</div>
</body></html>
